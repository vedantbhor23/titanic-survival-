<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Resume Generator</title>
  </head>
  <body>
    <!-- here goes html code  -->

    <div class="card mx-5 mt-3" id="cv-form">
      <div class="card-header">
        <h1 class="text-center my-2">Resume Generator</h1>
        <p class="text-center">PBL PROJECT - Sahil Gurjar , Siddesh Choudhari, Vedant Bhor, Vivek Jagtap, Swapnil Dudka, Shreyash Deshmukh</p
          >

        </div>
      <div class="card-body">
        <div class="container" >
        
          <div class="row">
            <div class="col-md-6">
              <!-- first col -->
              <h3>Personal Information</h3>

              <div class="form-group">
                <label for="nameField">Your Name</label>
                <input
                  type="text"
                  id="nameField"
                  placeholder="Enter here"
                  class="form-control"
                />
              </div>

              <div class="form-group mt-2">
                <label for="contactField">Your Contact</label>
                <input
                  type="text"
                  id="contactField"
                  placeholder="Enter here"
                  class="form-control"
                />
              </div>

              <div class="form-group mt-2">
                <label for="addressField">Your Address</label>
                <textarea
                  id="addressField"
                  placeholder="Enter here"
                  class="form-control"
                  rows="5"
                ></textarea>
              </div>

              <div class="form-group mt-3">
                <label for="">Select your photo</label>
                <input id="imgField" type="file" class="form-control" />
              </div>

              <p class="text-secondary my-3">Important Links</p>

              <div class="form-group mt-2">
                <label for="gmailField">Gmail</label>
                <input
                  type="text"
                  id="gmailField"
                  placeholder="Enter here"
                  class="form-control"
                />
              </div>
              <div class="form-group mt-2">
                <label for="fbField">Facebook </label>
                <input
                  type="text"
                  id="fbField"
                  placeholder="Enter here"
                  class="form-control"
                />
              </div>
              <div class="form-group mt-2">
                <label for="instaField">Instagram </label>
                <input
                  type="text"
                  id="instaField"
                  placeholder="Enter here"
                  class="form-control"
                />
                 </div>
              <div class="form-group mt-2">
                <label for="linkedField">LinkedIn</label>
                <input
                  type="text"
                  id="linkedField"
                  placeholder="Enter here"
                  class="form-control"
                />
              </div>
            </div>
            <div class="col-md-6">
              <!-- second col -->
              <h3>Professional Information</h3>

               <div class="form-group mt-2">
                <label for="">Objective</label>
                <textarea
                  id="objectiveField"
                  rows="5"
                  placeholder="Enter here"
                  class="form-control"
                ></textarea>
              </div>

              <div class="form-group mt-2" id="we">
                <label for="">Work Experience</label>
                <textarea
                  placeholder="Enter here"
                  class="form-control weField"
                  rows="3"
                ></textarea>

                <!-- new textarea -->
